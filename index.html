<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f0f1a;
            background: radial-gradient(circle, #1e1e2f 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: minmax(110px, auto) repeat(5, 75px);
            gap: 15px;
            padding: 25px;
            background: rgb(247, 244, 244);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgb(255, 255, 255);
        }

        .visor {
            grid-column: 1 / -1;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .historico {
            color: rgba(0, 210, 255, 0.7);
            font-size: 1.1rem;
            min-height: 1.2rem;
        }

        .resultado {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 300;
        }

        button {
            cursor: pointer;
            font-size: 1.3rem;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #efefef;
            border-radius: 18px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }

        .operador { 
            color: #00d2ff; 
            background: rgba(238, 236, 236, 0.1);
        }

        .limpar { 
            color: #ff5e62; 
            background: rgba(255, 94, 98, 0.1);
        }

        .igual {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
        }

        .dobro { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculadora">
        <div class="visor">
            <div class="historico">0</div>
            <div class="resultado">0</div>
        </div>
        <button class="limpar" onclick="limpar()">C</button>
        <button class="operador" onclick="inserirOperador('/')">/</button>
        <button class="operador" onclick="inserirOperador('*')">*</button>
        <button class="operador" onclick="inserirOperador('-')">-</button>
        <button onclick="inserirNumero('7')">7</button>
        <button onclick="inserirNumero('8')">8</button>
        <button onclick="inserirNumero('9')">9</button>
        <button class="operador" onclick="inserirOperador('+')">+</button>
        <button onclick="inserirNumero('4')">4</button>
        <button onclick="inserirNumero('5')">5</button>
        <button onclick="inserirNumero('6')">6</button>
        <button class="igual" onclick="calcular()">=</button>
        <button onclick="inserirNumero('1')">1</button>
        <button onclick="inserirNumero('2')">2</button>
        <button onclick="inserirNumero('3')">3</button>
        <button class="dobro" onclick="inserirNumero('0')">0</button>
    </div>

    <script>
        let display = document.querySelector('.resultado');
        let history = document.querySelector('.historico');
        let currentInput = '';
        let operator = '';
        let previousInput = '';

        function inserirNumero(num) {
            currentInput += num;
            display.textContent = currentInput;
        }

        function inserirOperador(op) {
            if (currentInput === '') return;
            if (previousInput !== '') {
                calcular();
            }
            operator = op;
            previousInput = currentInput;
            currentInput = '';
            history.textContent = previousInput + ' ' + operator;
        }

        function calcular() {
            if (currentInput === '' || previousInput === '') return;

            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = prev / current;
                    break;
                default:
                    return;
            }

            display.textContent = result;
            history.textContent = previousInput + ' ' + operator + ' ' + currentInput + ' =';
            currentInput = result.toString();
            previousInput = '';
            operator = '';
        }

        function limpar() {
            display.textContent = '0';
            history.textContent = '0';
            currentInput = '';
            previousInput = '';
            operator = '';
        }
    </script>
</body>
</html>
